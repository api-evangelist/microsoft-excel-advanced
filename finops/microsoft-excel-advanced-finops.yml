specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Microsoft Excel (Advanced)
providerId: microsoft-excel-advanced
publisherName: Microsoft Excel (Advanced)
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Automation
  - Business Intelligence
  - Data Analysis
  - Office
  - Spreadsheets
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Microsoft Excel (Advanced) API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Microsoft Excel (Advanced)
  ServiceCategory: Developer Tools / API
  ProviderName: Microsoft Excel (Advanced)
  PublisherName: Microsoft Excel (Advanced)
  InvoiceIssuerName: Microsoft Excel (Advanced)
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Microsoft Graph Excel API
    baseURL: https://graph.microsoft.com/v1.0
    tags:
      - Cloud
      - REST
      - Workbooks
      - Worksheets
    serviceName: Microsoft Graph Excel API
    serviceCategory: API
  - name: Office Scripts API
    baseURL: https://script.office.com
    tags:
      - Automation
      - Power-Automate
      - Scripting
      - Typescript
    serviceName: Office Scripts API
    serviceCategory: API
  - name: Excel JavaScript API
    baseURL: https://appsforoffice.microsoft.com
    tags:
      - Add-Ins
      - Extensions
      - Javascript
      - Office-Js
    serviceName: Excel JavaScript API
    serviceCategory: API
  - name: Excel Custom Functions API
    baseURL: ''
    tags:
      - Calculations
      - Custom-Functions
      - Formulas
      - Udf
    serviceName: Excel Custom Functions API
    serviceCategory: API
  - name: Excel REST API (OneDrive)
    baseURL: https://graph.microsoft.com/v1.0/me/drive
    tags:
      - Cloud-Storage
      - Onedrive
      - REST
      - Sharepoint
    serviceName: Excel REST API (OneDrive)
    serviceCategory: API
  - name: Power Automate Excel Connector
    baseURL: ''
    tags:
      - Connector
      - Low-Code
      - Power-Automate
      - Workflow
    serviceName: Power Automate Excel Connector
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
